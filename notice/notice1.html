<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>notice test</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f9f9f9;
      padding: 40px;
      margin: 0;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background-color: #ffffff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
      color: #333333;
    }

    .date {
      color: #888888;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .content {
      color: #444;
    }

    .back-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 10px 20px;
      background-color: #007BFF;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: background-color 0.3s;
    }

    .back-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>홈페이지 리뉴얼 안내</h2>
  <div class="date">게시일: 2025년 3월 15일</div>
  <div class="content">
    안녕하세요.<br><br>
    홈페이지 리뉴얼 안내는 다음과 같습니다.<br><br>
    관리자의 부재로 이 홈페이지는 자동으로 폭파합니다
  </div>
  <a href="notice.html" class="back-btn">← 목록으로</a>
</div>

</body>
</html>
