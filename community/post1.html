<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>게시글 상세</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f9f9f9;
      padding: 30px;
      margin: 0;
    }
    .wrapper {
      max-width: 800px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #cccccc;
      border-radius: 10px;
      padding: 20px;
      position: relative;
    }
    .date {
      text-align: center;
      font-size: 14px;
      color: #666666;
      margin-bottom: 10px;
    }
    .back-button {
      position: absolute;
      top: 14px;
      right: 22px;
      padding: 5px 10px;
      background-color: #f4f4f4;
      border: 1px solid #cccccc;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    /*section 공통*/
    .section {
      margin: 20px 0;
      border: 1px solid #cccccc;
      padding: 15px;
      border-radius: 6px;
    }
     /*제목 */
    .title-box {
      font-weight: bold;
      font-size: 18px;
    }
        /*내용 */
    .content-box {
      display: flex;
      justify-content: space-between;
    }
    .text-area {
      width: 65%;
      font-size: 16px;
      line-height: 1.5;
    }
    .image-area {
      width: 30%;
      border: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f0f0f0;
      height: 150px;
    }
    .comment-box {
      margin-top: 30px;
    }
    .comment-box textarea {
      width: 96%;
      height: 80px;
      padding: 12px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #cccccc;
      resize: none; /* 안하면 게시판 크기 자유자재로 바뀜 */
    }
    .comment-box button {
      margin-top: 10px;
      padding: 8px 16px;
      background-color: #007BFF;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      position:relative;
      top : -6px;
    }
    .comment-list {
      margin-top: 20px;
      font-size: 14px;
    }
    .comment-item {
      background-color: #f4f4f4;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="date">2025-04-14</div>
    <button class="back-button" onclick="goBack()">목록</button>
    <div class="section title-box">딸기</div>
    <div class="section content-box">
      <div class="text-area">
        딸기는 왜딸기일까
        사람들이 딸기라고 하니까 딸기인거지
        그렇다고 딸기를 좋아하냐
        귀찮아서 안먹을 뿐
      </div>
      <div class="image-area">
        사진첨부
      </div>
    </div>
    <div class="section comment-box">
      <label for="comment">댓글/답글</label>
      <textarea id="comment" placeholder="댓글을 입력하세요."></textarea>
      <button onclick="saveComment()">등록</button>

      <div class="comment-list" id="commentList">
        <!-- 댓글이 여기에 추가됩니다 -->
      </div>
    </div>
  </div>
  <script>
    function goBack() {
      window.location.href = 'community.html';
    }

    function saveComment() {
      const input = document.getElementById('comment');
      const list = document.getElementById('commentList');
      const value = input.value.trim();

      if (value) {
        const div = document.createElement('div');
        div.className = 'comment-item';
        div.innerText = value;
        list.appendChild(div);
        input.value = '';
      }
    }
  </script>
</body>
</html>
